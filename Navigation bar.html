<!DOCTYPE html>
<html>
    <head>
        <title>Navbar</title>
        <style>
            body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
            }
            .topnav {
                overflow: hidden;
                background-color:blueviolet;
            }
            .topnav a {
                float:left;
                color: #FFF700;
                text-align: center;
                padding: 14px 16px;
                text-decoration:none;
                font-size: 17px;
            }
            .topnav a:hover {
                background-color: #ddd;
                color:black;
            }
            .topnav a.active {
                background-color: #E6D6FF;
                color: black;
            }
        </style>
    </head>
    <body>
        <div class="topnav">
            <a class="active" href="home.html">Home</a>
            <a href="About_Us.html">About_Us</a>
            <a href="Gallery.html">Gallery</a>
            <a href="Contact_Us.html">Contact_Us</a>
            <a href="projects.html">Projects</a>
        </div>
    
        <section>
            <img class="mySlides" src="birds flying moments.avif" style="height:700px; width:100%;">
            <img class="mySlides" src="cute birds.webp" style="height:700px; width:100%;">
            <img class="mySlides" src="pet birds.webp" style="height:700px; width:100%;">
            <img class="mySlides" src="white bird.webp" style="height:900px; width:100%;">
        </section>
        <script>
            // Automatic Slideshow - change image every 3 seconds
            var myIndex = 0;
            carousel();

            function carousel() {
                var i;
                var x = document.getElementsByClassName("mySlides");
                for (i = 0; i < x.length; i++) {
                    x[i].style.display = "none";
                }
                myIndex++;
                if (myIndex > x.length) { myIndex = 1 }
                x[myIndex - 1].style.display = "block";
                setTimeout(carousel, 3000)
            }
            </script>
    </body>
</html>

        <title>Navbar</title>
        <style>
            body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
            }
            .topnav {
                overflow: hidden;
                background-color:blueviolet;
            }
            .topnav a {
                float:left;
                color: #FFF700;
                text-align: center;
                padding: 14px 16px;

                color: black;
            }
        </style>
    </head>
